<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a0800"/>
      <stop offset="100%" stop-color="#0f0600"/>
    </radialGradient>
    <radialGradient id="lanternGrad" cx="38%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#f04828"/>
      <stop offset="55%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7a1810"/>
    </radialGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bg)"/>

  <!-- 顶部绳子 -->
  <line x1="256" y1="58" x2="256" y2="95" stroke="#d4a017" stroke-width="8" stroke-linecap="round"/>

  <!-- 顶盖 -->
  <rect x="176" y="86" width="160" height="32" rx="8" fill="url(#goldShine)"/>

  <!-- 灯笼主体 -->
  <ellipse cx="256" cy="282" rx="148" ry="174" fill="url(#lanternGrad)"/>

  <!-- 竖纹装饰 -->
  <line x1="256" y1="112" x2="256" y2="452" stroke="rgba(212,160,23,0.4)" stroke-width="6"/>
  <line x1="197" y1="120" x2="190" y2="448" stroke="rgba(212,160,23,0.25)" stroke-width="4"/>
  <line x1="315" y1="120" x2="322" y2="448" stroke="rgba(212,160,23,0.25)" stroke-width="4"/>
  <line x1="152" y1="158" x2="138" y2="408" stroke="rgba(212,160,23,0.15)" stroke-width="3"/>
  <line x1="360" y1="158" x2="374" y2="408" stroke="rgba(212,160,23,0.15)" stroke-width="3"/>

  <!-- 高光 -->
  <ellipse cx="210" cy="220" rx="48" ry="40" fill="rgba(255,120,80,0.25)"/>

  <!-- 灯笼金色边框 -->
  <ellipse cx="256" cy="282" rx="148" ry="174" fill="none" stroke="url(#goldShine)" stroke-width="10"/>

  <!-- 底盖 -->
  <rect x="176" y="450" width="160" height="32" rx="8" fill="url(#goldShine)"/>

  <!-- 流苏 -->
  <g stroke="#d4a017" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="206" y1="482" x2="200" y2="510"/>
    <line x1="228" y1="482" x2="224" y2="512"/>
    <line x1="256" y1="482" x2="256" y2="512"/>
    <line x1="284" y1="482" x2="288" y2="512"/>
    <line x1="306" y1="482" x2="312" y2="510"/>
  </g>

  <!-- 中心文字"农" -->
  <text x="256" y="310"
        font-family="SimSun, STSong, serif"
        font-size="138"
        font-weight="bold"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#ffe066"
        filter="url(#glow)">农</text>
</svg>
